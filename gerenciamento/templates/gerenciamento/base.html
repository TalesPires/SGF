<!DOCTYPE html>
<html lang="pt-br">
<head>
    {% load static%}
    {% load django_bootstrap5 %}
    {% bootstrap_css %}
    {% bootstrap_javascript %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="{% static 'gerenciamento/style.css'%}" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <img class="ms-3" width="125" src="{% static 'gerenciamento/OPL-Fundo-Branco-1.png' %}" alt="logotipo">
            </div>

            <div class="d-flex align-items-center me-1 ">
                <img width="55" src="{% static 'gerenciamento/Profile-PNG-Image.png' %}" alt="pfoto">
                <p class="ms-1 mt-3 me-3" style="font-size: 142%;">{{user.nome_usuario}}</p>
            </div>
        </div>
    {% block content %}{% endblock content %}
</body>
</html>
